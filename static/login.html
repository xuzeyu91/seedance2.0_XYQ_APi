<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - 小云雀</title>
    <style>
        :root {
            --bg-color: #f3f4f6;
            --panel-bg: #ffffff;
            --border-color: #e5e7eb;
            --text-main: #111827;
            --text-muted: #6b7280;
            --primary: #000000;
            --primary-hover: #374151;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --danger: #ef4444;
            --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            line-height: 1.5;
            padding: 24px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px;
            box-shadow: var(--shadow-sm);
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.6;
        }

        .credential-box {
            background: #f9fafb;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
        }

        .credential-box span {
            display: inline-block;
            margin: 0 8px;
        }
        
        .credential-box code {
            font-family: monospace;
            background: #e5e7eb;
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--text-main);
            font-weight: 500;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
        }

        .form-group input {
            background: #fff;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text-main);
            font-size: 14px;
            transition: all 0.2s;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
        }

        button {
            margin-top: 8px;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
            font-family: inherit;
        }

        button:hover {
            background: var(--primary-hover);
            box-shadow: var(--shadow);
            transform: translateY(-1px);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background: #e5e7eb;
            color: #9ca3af;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .message {
            min-height: 20px;
            color: var(--danger);
            font-size: 13px;
            text-align: center;
            margin-top: -4px;
        }

        .hint {
            margin-top: 24px;
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <main class="login-container">
        <div class="header">
            <h1> 小云雀后台管理</h1>
            <p>登录以管理视频生成任务及系统配置</p>
        </div>

        <div class="credential-box">
            <span>默认账号：<code>admin</code></span>
            <span>密码：<code>admin</code></span>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label>管理员账号</label>
                <input id="username" name="username" type="text" autocomplete="username" value="admin" required placeholder="请输入账号">
            </div>
            <div class="form-group">
                <label>管理员密码</label>
                <input id="password" name="password" type="password" autocomplete="current-password" value="admin" required placeholder="请输入密码">
            </div>
            <button id="submit-btn" type="submit">登录系统</button>
            <div id="message" class="message"></div>
        </form>

        <div class="hint">安全提示：首次登录后建议在系统右上角账号设置中修改默认的账号、密码和 API Key。</div>
    </main>

    <script>
        const form = document.getElementById('login-form');
        const submitBtn = document.getElementById('submit-btn');
        const message = document.getElementById('message');

        async function checkLoggedIn() {
            try {
                const response = await fetch('/api/auth/status');
                const result = await response.json();
                if (result.authenticated) {
                    window.location.replace('/');
                }
            } catch (error) {
                console.error('Failed to check auth status:', error);
            }
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            message.textContent = '';
            submitBtn.disabled = true;
            submitBtn.textContent = '登录中...';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value.trim(),
                        password: document.getElementById('password').value
                    })
                });
                const result = await response.json();

                if (result.status === 'success') {
                    window.location.replace('/');
                    return;
                }

                message.textContent = result.message || '登录失败';
            } catch (error) {
                message.textContent = '无法连接到服务，请稍后再试';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '登录系统';
            }
        });

        checkLoggedIn();
    </script>
</body>
</html>
